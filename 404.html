    <title>Portfolio CNS | Nông Văn Bách</title>
    <script>
      (() => {
        const storageKey = "portfolio-theme";

        try {
          const storedTheme = window.localStorage.getItem(storageKey);
          const theme = storedTheme === "light" || storedTheme === "dark" ? storedTheme : "dark";

          document.documentElement.setAttribute("data-theme", theme);
          document.documentElement.style.colorScheme = theme;
        } catch {
          document.documentElement.setAttribute("data-theme", "dark");
          document.documentElement.style.colorScheme = "dark";
        }
      })();

      window.__loadBuiltPortfolio = () => {
        if (window.__portfolioFallbackLoaded) {
          return;
        }

        window.__portfolioFallbackLoaded = true;

        const basePath = "/vanbach2311.07-portfolio/";
        const stylesheet = document.createElement("link");
        stylesheet.rel = "stylesheet";
        stylesheet.href = `${basePath}assets/index-7sWa46wl.css`;
        document.head.appendChild(stylesheet);

        const script = document.createElement("script");
        script.type = "module";
        script.src = `${basePath}assets/index-Cndt_ufR.js`;
        document.body.appendChild(script);
      };
    </script>
    <script type="module" crossorigin src="/vanbach2311.07-portfolio/assets/index-Cndt_ufR.js"></script>
    <link rel="stylesheet" crossorigin href="/vanbach2311.07-portfolio/assets/index-7sWa46wl.css">
  </head>
